evaluation_name: "aitana-7B_continual_BSC"
description: "Configuration file for evaluation of base_llm_Models"


models:
  local: True # Set to True if the model is hosted locally of False if it is evlauated from huggingface
  models_names: cpt_7b_after_annealing_gplsi #,cpt_7b_after_annealing_higherLR_gplsi,cpt_7b_before_annealing_higherLR_gplsi #e-001-gs-009438,e-001-gs-018876,e-001-gs-028314,e-001-gs-037751  # List of models nambes to be evaluated
  models_path: /home/gplsi/GPLSI/ALIA/modelos/Continual/AITANA_7B_BSC_TRAIN # List of paths to the models to be evaluated

evaluation:
  evaluation_folder: /home/gplsinas/ALIA/modelos/Continual/Salamandra_7B/evaluaciones # Path to the folder where the evlaluation results will be stored
  evaluation_folder_gold: /home/gplsi/GPLSI/ALIA/modelos/Evaluation/Continual/gold # Path where results of other evaluations are stored to be included in the final evaluation
  instruct: False
  shots: 5 # Number of shots to be used in the evaluation

wandb_project: "aitana-7B_continual_BSC" # Name of the wandb project to log the results

languages:
  - Spanish: True # Set to true if want to evaluate the model in Spanish tasks
  - English: True # Set to true if want to evaluate the model in English tasks
  - Valencian: True # Set to true if want to evaluate the model in Valencian tasks
  - Catalan: True # Set to true if want to evaluate the model in Catalan tasks