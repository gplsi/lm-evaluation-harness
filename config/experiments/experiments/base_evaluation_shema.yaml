evaluation_name: "aitana-s2b-c3dc3_evaluation"
description: "Configuration file for evaluation of base_llm_Models"


models:
  local: True # Set to True if the model is hosted locally of False if it is evlauated from huggingface
  models_names: e-001-gs-007368,e-001-gs-014736,e-002-gs-022104,e-002-gs-029472,e-002-gs-029473  # List of models nambes to be evaluated
  models_path: /home/gplsi/GPLSI/ALIA/modelos/Continual/aitana-s2b-c3dc3/hf # List of paths to the models to be evaluated

evaluation:
