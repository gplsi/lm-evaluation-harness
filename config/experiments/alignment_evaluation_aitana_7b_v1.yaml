evaluation_name: "Aitana-7b-v1-aligned-v8"
description: "Configuration file for evaluation of instruction-following models."

models:
  local: True # Set to True if the model is hosted locally of False if it is evlauated from huggingface
  models_names: checkpoint-1000,checkpoint-3000,checkpoint-5000,checkpoint-7000 #checkpoint-1000, List of models nambes to be evaluated
  models_path: /home/gplsi/GPLSI/ALIA/modelos/Instruction/Alignment/ALIA_aligned_instruction_aitana_7b_v1_data_v8/hf_models # List of paths to the models to be evaluated

evaluation:
  evaluation_folder: /home/gplsi/GPLSI/ALIA/modelos/Instruction/Alignment/ALIA_aligned_instruction_aitana_7b_v1_data_v8/evaluaciones # Path to the folder where the evlaluation results will be stored
  evaluation_folder_gold: /home/gplsi/GPLSI/ALIA/modelos/Evaluation/Instruction/gold # Path where results of other evaluations are stored to be included in the final evaluation
  instruct: True
  shots: 0 # Number of shots to be used in the evaluation

wandb_project: "v19-long-sequence-3-epoch-instruct-evaluation" # Name of the wandb project to log the results


languages:
  - Spanish: true # Set to true if want to evaluate the model in Spanish tasks
  - English: true # Set to true if want to evaluate the model in English tasks
  - Valencian: true # Set to true if want to evaluate the model in Valencian tasks
  - Catalan: true # Set to true if want to evaluate the model in Catalan tasks